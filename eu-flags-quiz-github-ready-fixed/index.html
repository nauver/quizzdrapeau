<!doctype html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Quiz Drapeaux UE – GitHub ready (public)</title><meta name="description" content="Quiz Drapeaux UE prêt pour GitHub Pages"><style>html,body,#root{height:100%;margin:0}body{background:#071A3D;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}*{box-sizing:border-box}a{text-decoration:none}button{cursor:pointer}button:disabled{cursor:default}.flash{display:none;position:fixed;inset:0;z-index:50;pointer-events:none}.shell{min-height:100vh;color:#fff;background:linear-gradient(180deg,#163B7A 0%,#071A3D 100%);padding:20px}.wrap{max-width:1800px;margin:0 auto;display:flex;flex-direction:column;gap:20px}.banner-wrap{position:fixed;left:0;right:0;top:32px;z-index:60;display:flex;justify-content:center;pointer-events:none}.banner{border:1px solid;border-radius:999px;padding:20px 40px;font-size:32px;font-weight:900;box-shadow:0 20px 60px rgba(0,0,0,.35)}.header{border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.03);border-radius:24px;padding:18px 20px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}.brand{display:flex;align-items:center;gap:16px}.brand-mark{height:64px;width:192px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.10);border-radius:14px;background:rgba(255,255,255,.02);font-size:12px;font-weight:700;letter-spacing:.22em;text-align:center;padding:8px}.kicker{font-size:12px;letter-spacing:.42em;text-transform:uppercase;color:#cbd5e1}h1{margin:8px 0 0 0;font-size:40px;font-weight:900}.sub{margin-top:8px;font-size:14px;color:#cbd5e1}.controls{display:flex;gap:8px;flex-wrap:wrap}.btn{padding:12px 18px;border-radius:12px;font-size:16px;font-weight:900}.primary{border:0;background:#FFCC00;color:#071A3D}.dark{border:0;background:#0B1D43;color:#fff}.secondary{border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.03);color:#fff}.link{border:1px solid rgba(255,255,255,.10);color:#fff;display:inline-flex;align-items:center}.accent{border-color:#FFCC00;color:#FFCC00}.win{border:0;background:#16A34A;color:#fff}.wide{width:100%}.grid{display:grid;grid-template-columns:minmax(280px,1fr) minmax(600px,2fr) minmax(280px,1fr);gap:20px;align-items:start}.side{border:1px solid rgba(255,255,255,.10);border-radius:32px;padding:20px;transition:all .3s}.side-top{display:flex;justify-content:space-between;align-items:center;gap:12px}.side-label{font-size:12px;letter-spacing:.34em;text-transform:uppercase;color:#cbd5e1}.key{border:1px solid rgba(255,255,255,.10);border-radius:12px;padding:6px 12px;font-size:12px;font-weight:600;color:#fff}.buzz{margin-top:24px;height:176px;width:100%;border-radius:999px;font-size:48px;font-weight:900;letter-spacing:.2em;color:#071A3D;transition:all .3s}.stack{margin-top:24px;display:grid;gap:12px}.metric,.quiz,.anim-card{border:1px solid rgba(255,255,255,.10);background:rgba(0,0,0,.12);border-radius:14px;padding:16px}.metric-t,.anim-title,.panel-kicker{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:#94a3b8}.metric-v{margin-top:8px;font-size:32px;font-weight:900;color:#fff}.centre{border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.03);border-radius:32px;padding:20px}.centre-grid{display:grid;gap:20px;align-items:start}.quiz{border-radius:24px;text-align:center;padding:20px}.panel-kicker{font-size:14px;letter-spacing:.34em;color:#cbd5e1}.stage{margin-top:24px;display:flex;flex-direction:column;align-items:center;justify-content:center}.ring-wrap{position:relative;height:560px;width:560px;max-width:100%;max-height:56vw}.ring{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg)}.flag-content{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:56px}.flag-card{display:flex;align-items:center;justify-content:center;height:70%;width:70%;border-radius:24px;border:1px solid rgba(255,255,255,.10);background:#F5F7FB;padding:12px}.flag-img{max-width:100%;max-height:100%;object-fit:contain;border-radius:16px}.emoji{font-size:12rem;line-height:1}.count{margin-top:24px;font-size:8rem;font-weight:900;line-height:1}.question{margin-top:16px;font-size:20px;font-weight:700;color:#e2e8f0}.info-grid{margin-top:24px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.anim{display:flex;flex-direction:column;gap:20px}.anim-card{border-radius:24px;padding:20px}.answer{margin-top:16px;border:1px solid #FFCC00;background:rgba(255,204,0,.08);border-radius:14px;padding:16px;font-size:24px}.answer span{font-weight:900;color:#FFCC00}.actions{display:grid;gap:12px;margin-top:16px}.status{margin-top:16px;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.03);border-radius:14px;padding:16px;color:#e2e8f0}.note{margin-top:12px;font-size:14px;color:#cbd5e1}@media(max-width:1400px){.grid{grid-template-columns:1fr}.centre-grid{grid-template-columns:1fr!important}.ring-wrap{height:440px;width:440px}.count{font-size:6rem}}@media(max-width:800px){h1{font-size:28px}.ring-wrap{height:320px;width:320px}.flag-content{padding:36px}.emoji{font-size:7rem}.count{font-size:4.5rem}.info-grid{grid-template-columns:1fr}}</style></head><body><div id="root"></div><script>window.__QUIZ_VIEW__ = "public";</script><script src="./app.js"></script></body></html>
